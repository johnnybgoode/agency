name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run vulnerability check
        uses: golang/govulncheck-action@v1
        with:
          go-package: ./...

      - name: Run linter
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build ./cmd/agency
