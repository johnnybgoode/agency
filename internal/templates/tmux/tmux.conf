# Agency session configuration — loaded at server startup via tmux -f.

# Hide the status bar; agency's sidebar is the source of truth.
set-option -g status off

# Use C-a as the prefix (shorter chord, avoids C-b conflicts with readline).
set-option -g prefix C-a
unbind-key C-b

# Clear all default key bindings, then add the only two agency needs:
#   C-a a — toggle between sidebar and workspace pane
unbind-key -a
bind-key a last-pane
